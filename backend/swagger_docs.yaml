openapi: 3.0.0
info:
  title: IDC设备管理系统 API
  version: 1.0.0
  description: |
    IDC设备管理系统后端API文档

    ## 认证说明
    除健康检查接口外，所有接口都需要在请求头中携带JWT Token：
    ```
    Authorization: Bearer <token>
    ```

    ## 通用响应格式
    ### 成功响应
    ```json
    {
      "success": true,
      "data": {...},
      "message": "操作成功"
    }
    ```

    ### 错误响应
    ```json
    {
      "success": false,
      "error": "错误类型",
      "message": "详细描述"
    }
    ```

    ## 分页参数
    列表接口支持 `page` 和 `pageSize` 参数，默认 page=1, pageSize=10

servers:
  - url: http://localhost:8000
    description: 开发环境服务器

security:
  - bearerAuth: []

tags:
  - name: health
    description: 健康检查
  - name: auth
    description: 认证接口
  - name: rooms
    description: 机房管理
  - name: racks
    description: 机柜管理
  - name: devices
    description: 设备管理
  - name: deviceFields
    description: 设备字段
  - name: device-ports
    description: 设备端口
  - name: network-cards
    description: 网卡管理
  - name: cables
    description: 线缆管理
  - name: tickets
    description: 工单管理
  - name: ticket-categories
    description: 工单分类
  - name: ticket-fields
    description: 工单字段
  - name: consumables
    description: 耗材管理
  - name: consumable-categories
    description: 耗材分类
  - name: consumable-records
    description: 耗材记录
  - name: users
    description: 用户管理
  - name: roles
    description: 角色管理
  - name: system-settings
    description: 系统设置
  - name: background
    description: 背景配置
  - name: inventory
    description: 盘点管理
  - name: statistics
    description: 统计接口
  - name: operation-logs
    description: 操作日志
  - name: backup
    description: 备份管理

paths:
  /health:
    get:
      summary: 健康检查
      description: 服务状态检查接口，无需认证
      tags: [health]
      responses:
        '200':
          description: 服务正常运行
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                    example: ok
                  message:
                    type: string
                    example: IDC设备管理系统后端服务正常运行

  /api-docs:
    get:
      summary: API文档页面
      description: 返回Swagger UI界面

  /api/auth/login:
    post:
      summary: 用户登录
      tags: [auth]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [username, password]
              properties:
                username:
                  type: string
                  description: 用户名
                password:
                  type: string
                  description: 密码
      responses:
        '200':
          description: 登录成功
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  data:
                    type: object
                    properties:
                      token:
                        type: string
                      user:
                        type: object
                        properties:
                          userId:
                            type: string
                          username:
                            type: string
                          email:
                            type: string
                          phone:
                            type: string
                          status:
                            type: string
                          roles:
                            type: array
                            items:
                              type: object
                  message:
                    type: string

  /api/auth/register:
    post:
      summary: 用户注册
      tags: [auth]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [username, password]
              properties:
                username:
                  type: string
                  description: 用户名（3-20字符）
                password:
                  type: string
                  description: 密码（6-20字符）
                email:
                  type: string
                phone:
                  type: string
      responses:
        '201':
          description: 注册成功

  /api/auth/me:
    get:
      summary: 获取当前用户信息
      tags: [auth]
      responses:
        '200':
          description: 成功

  /api/rooms:
    get:
      summary: 获取机房列表
      tags: [rooms]
      parameters:
        - name: keyword
          in: query
          schema:
            type: string
          description: 按名称搜索
        - name: status
          in: query
          schema:
            type: string
          description: 按状态筛选
      responses:
        '200':
          description: 成功
          content:
            application/json:
              schema:
                type: object
                properties:
                  roomId:
                    type: string
                  name:
                    type: string
                  location:
                    type: string
                  area:
                    type: number
                  status:
                    type: string
    post:
      summary: 创建机房
      tags: [rooms]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [roomId, name]
              properties:
                roomId:
                  type: string
                  description: 机房ID（唯一标识）
                name:
                  type: string
                  description: 机房名称
                location:
                  type: string
                  description: 机房位置
                area:
                  type: number
                  description: 面积(平方米)
                description:
                  type: string
                  description: 描述
                status:
                  type: string
                  enum: [active, inactive]
      responses:
        '201':
          description: 创建成功

  /api/rooms/{roomId}:
    get:
      summary: 获取单个机房
      tags: [rooms]
      parameters:
        - name: roomId
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: 成功
    put:
      summary: 更新机房
      tags: [rooms]
      parameters:
        - name: roomId
          in: path
          required: true
          schema:
            type: string
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                name:
                  type: string
                location:
                  type: string
                area:
                  type: number
                description:
                  type: string
                status:
                  type: string
      responses:
        '200':
          description: 更新成功
    delete:
      summary: 删除机房
      tags: [rooms]
      parameters:
        - name: roomId
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: 删除成功

  /api/racks:
    get:
      summary: 获取机柜列表
      tags: [racks]
      parameters:
        - name: roomId
          in: query
          schema:
            type: string
          description: 按机房ID筛选
        - name: status
          in: query
          schema:
            type: string
          description: 按状态筛选
        - name: keyword
          in: query
          schema:
            type: string
          description: 按名称搜索
        - name: page
          in: query
          schema:
            type: integer
            default: 1
        - name: pageSize
          in: query
          schema:
            type: integer
            default: 10
      responses:
        '200':
          description: 成功
          content:
            application/json:
              schema:
                type: object
                properties:
                  racks:
                    type: array
                    items:
                      type: object
                  total:
                    type: integer
                  page:
                    type: integer
                  pageSize:
                    type: integer
    post:
      summary: 创建机柜
      tags: [racks]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [name, roomId]
              properties:
                name:
                  type: string
                  description: 机柜名称
                height:
                  type: integer
                  description: 高度(U)，默认42
                maxPower:
                  type: integer
                  description: 额定功率(W)
                roomId:
                  type: string
                  description: 所属机房ID
                status:
                  type: string
                  enum: [active, maintenance, inactive]
                description:
                  type: string
      responses:
        '201':
          description: 创建成功

  /api/racks/{rackId}:
    get:
      summary: 获取单个机柜
      tags: [racks]
      parameters:
        - name: rackId
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: 成功
    put:
      summary: 更新机柜
      tags: [racks]
      parameters:
        - name: rackId
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: 更新成功
    delete:
      summary: 删除机柜
      tags: [racks]
      parameters:
        - name: rackId
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: 删除成功

  /api/racks/import-template:
    get:
      summary: 获取机柜导入模板
      tags: [racks]
      responses:
        '200':
          description: 返回Excel模板文件
          content:
            application/octet-stream:
              schema:
                type: string
                format: binary

  /api/racks/export:
    get:
      summary: 导出机柜数据
      tags: [racks]
      responses:
        '200':
          description: 返回Excel文件
          content:
            application/octet-stream:
              schema:
                type: string
                format: binary

  /api/racks/import:
    post:
      summary: 导入机柜数据
      tags: [racks]
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              properties:
                file:
                  type: string
                  format: binary
                  description: Excel格式的机柜数据文件
      responses:
        '200':
          description: 导入成功

  /api/devices:
    get:
      summary: 获取设备列表
      tags: [devices]
      parameters:
        - name: rackId
          in: query
          schema:
            type: string
        - name: type
          in: query
          schema:
            type: string
          description: 设备类型
        - name: status
          in: query
          schema:
            type: string
        - name: keyword
          in: query
          schema:
            type: string
          description: 关键词搜索（名称/IP/序列号）
        - name: page
          in: query
          schema:
            type: integer
            default: 1
        - name: pageSize
          in: query
          schema:
            type: integer
            default: 10
      responses:
        '200':
          description: 成功
          content:
            application/json:
              schema:
                type: object
                properties:
                  devices:
                    type: array
                    items:
                      type: object
                  total:
                    type: integer
                  page:
                    type: integer
                  pageSize:
                    type: integer
    post:
      summary: 创建设备
      tags: [devices]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [name, type, serialNumber]
              properties:
                name:
                  type: string
                  description: 设备名称
                type:
                  type: string
                  enum: [server, switch, router, storage, other]
                  description: 设备类型
                model:
                  type: string
                serialNumber:
                  type: string
                rackId:
                  type: string
                position:
                  type: integer
                  description: 机柜位置（从1开始）
                height:
                  type: integer
                  description: 占用高度(U)
                powerConsumption:
                  type: integer
                  description: 功耗(W)
                ipAddress:
                  type: string
                status:
                  type: string
                  enum: [running, maintenance, offline, fault]
                purchaseDate:
                  type: string
                  format: date
                warrantyExpiry:
                  type: string
                  format: date
                description:
                  type: string
                customFields:
                  type: object
                  description: 自定义字段值
      responses:
        '201':
          description: 创建成功

  /api/devices/{deviceId}:
    get:
      summary: 获取单个设备
      tags: [devices]
      parameters:
        - name: deviceId
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: 成功
    put:
      summary: 更新设备
      tags: [devices]
      parameters:
        - name: deviceId
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: 更新成功
    delete:
      summary: 删除设备
      tags: [devices]
      parameters:
        - name: deviceId
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: 删除成功

  /api/devices/batch-delete:
    post:
      summary: 批量删除设备
      tags: [devices]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [deviceIds]
              properties:
                deviceIds:
                  type: array
                  items:
                    type: string
                  description: 设备ID列表
      responses:
        '200':
          description: 删除成功

  /api/devices/delete-all:
    delete:
      summary: 删除所有设备
      tags: [devices]
      responses:
        '200':
          description: 删除成功

  /api/devices/batch-online:
    put:
      summary: 批量上线设备
      tags: [devices]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [deviceIds]
              properties:
                deviceIds:
                  type: array
                  items:
                    type: string
      responses:
        '200':
          description: 操作成功

  /api/devices/batch-offline:
    put:
      summary: 批量下线设备
      tags: [devices]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [deviceIds]
              properties:
                deviceIds:
                  type: array
                  items:
                    type: string
      responses:
        '200':
          description: 操作成功

  /api/devices/batch-status:
    put:
      summary: 批量变更设备状态
      tags: [devices]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [deviceIds, status]
              properties:
                deviceIds:
                  type: array
                  items:
                    type: string
                status:
                  type: string
                  enum: [running, maintenance, offline, fault]
      responses:
        '200':
          description: 操作成功

  /api/devices/batch-move:
    put:
      summary: 批量移动设备
      tags: [devices]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [deviceIds, targetRackId]
              properties:
                deviceIds:
                  type: array
                  items:
                    type: string
                targetRackId:
                  type: string
                  description: 目标机柜ID
                startPosition:
                  type: integer
                  description: 起始位置
      responses:
        '200':
          description: 操作成功

  /api/devices/import-template:
    get:
      summary: 获取设备导入模板
      tags: [devices]
      responses:
        '200':
          description: 返回CSV模板文件

  /api/devices/export:
    get:
      summary: 导出设备数据
      tags: [devices]
      parameters:
        - name: deviceIds
          in: query
          schema:
            type: string
          description: 指定导出的设备ID（逗号分隔）
      responses:
        '200':
          description: 返回CSV文件

  /api/devices/import:
    post:
      summary: 导入设备数据
      tags: [devices]
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              properties:
                csvFile:
                  type: string
                  format: binary
                  description: CSV格式的设备数据文件
      responses:
        '200':
          description: 导入成功

  /api/devices/enhanced-export:
    get:
      summary: 增强导出设备数据
      tags: [devices]
      parameters:
        - name: deviceIds
          in: query
          schema:
            type: string
        - name: format
          in: query
          schema:
            type: string
            enum: [csv, json]
            default: csv
        - name: fields
          in: query
          schema:
            type: string
          description: JSON格式的字段列表
        - name: fieldLabels
          in: query
          schema:
            type: string
          description: JSON格式的字段标签映射
      responses:
        '200':
          description: 导出成功

  /api/devices/{deviceId}/tickets:
    get:
      summary: 获取设备的工单列表
      tags: [devices]
      parameters:
        - name: deviceId
          in: path
          required: true
          schema:
            type: string
        - name: status
          in: query
          schema:
            type: string
        - name: page
          in: query
          schema:
            type: integer
            default: 1
        - name: pageSize
          in: query
          schema:
            type: integer
            default: 10
      responses:
        '200':
          description: 成功

  /api/tickets:
    get:
      summary: 获取工单列表
      tags: [tickets]
      parameters:
        - name: status
          in: query
          schema:
            type: string
          description: 按状态筛选（pending/in_progress/completed/closed）
        - name: priority
          in: query
          schema:
            type: string
          description: 按优先级筛选（urgent/high/medium/low）
        - name: faultCategory
          in: query
          schema:
            type: string
        - name: deviceId
          in: query
          schema:
            type: string
        - name: page
          in: query
          schema:
            type: integer
            default: 1
        - name: pageSize
          in: query
          schema:
            type: integer
            default: 10
      responses:
        '200':
          description: 成功
    post:
      summary: 创建工单
      tags: [tickets]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [faultCategory, description]
              properties:
                title:
                  type: string
                faultCategory:
                  type: string
                  description: 故障分类
                faultSubCategory:
                  type: string
                priority:
                  type: string
                  enum: [urgent, high, medium, low]
                description:
                  type: string
                deviceId:
                  type: string
                deviceName:
                  type: string
                serialNumber:
                  type: string
                expectedCompletionDate:
                  type: string
                  format: date
                reporterId:
                  type: string
                reporterName:
                  type: string
      responses:
        '201':
          description: 创建成功

  /api/cables:
    get:
      summary: 获取线缆列表
      tags: [cables]
      parameters:
        - name: sourceDeviceId
          in: query
          schema:
            type: string
          description: 源设备ID
        - name: targetDeviceId
          in: query
          schema:
            type: string
          description: 目标设备ID
        - name: cableType
          in: query
          schema:
            type: string
          description: 线缆类型
        - name: status
          in: query
          schema:
            type: string
        - name: page
          in: query
          schema:
            type: integer
        - name: pageSize
          in: query
          schema:
            type: integer
      responses:
        '200':
          description: 成功
    post:
      summary: 创建线缆
      tags: [cables]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                sourceDeviceId:
                  type: string
                  description: 源设备ID
                sourcePortId:
                  type: string
                  description: 源端口ID
                targetDeviceId:
                  type: string
                  description: 目标设备ID
                targetPortId:
                  type: string
                  description: 目标端口ID
                cableType:
                  type: string
                  description: 线缆类型
                fiberType:
                  type: string
                  description: 光纤类型
                length:
                  type: number
                  description: 长度(米)
                status:
                  type: string
                description:
                  type: string
      responses:
        '201':
          description: 创建成功

  /api/cables/{cableId}:
    get:
      summary: 获取单个线缆
      tags: [cables]
      parameters:
        - name: cableId
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: 成功
    put:
      summary: 更新线缆
      tags: [cables]
      parameters:
        - name: cableId
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: 更新成功
    delete:
      summary: 删除线缆
      tags: [cables]
      parameters:
        - name: cableId
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: 删除成功

  /api/cables/batch:
    post:
      summary: 批量创建线缆
      tags: [cables]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                cables:
                  type: array
                  items:
                    type: object
      responses:
        '201':
          description: 创建成功

  /api/cables/batch-delete:
    post:
      summary: 批量删除线缆
      tags: [cables]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                cableIds:
                  type: array
                  items:
                    type: string
      responses:
        '200':
          description: 删除成功

  /api/cables/device/:deviceId:
    get:
      summary: 获取设备关联的线缆列表
      tags: [cables]
      parameters:
        - name: deviceId
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: 成功

  /api/cables/rack/:rackId:
    get:
      summary: 获取机柜关联的线缆列表
      tags: [cables]
      parameters:
        - name: rackId
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: 成功

  /api/cables/check-conflict:
    post:
      summary: 检查线缆路径冲突
      tags: [cables]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                sourceDeviceId:
                  type: string
                sourcePortId:
                  type: string
                targetDeviceId:
                  type: string
                targetPortId:
                  type: string
      responses:
        '200':
          description: 检查成功

  /api/tickets/{ticketId}:
    get:
      summary: 获取单个工单
